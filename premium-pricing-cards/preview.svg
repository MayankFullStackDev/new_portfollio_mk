<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#311042"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#f8fafc"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#64748b"/>

    <!-- Screen Mockup Content -->
    <!-- Header -->
    <rect x="240" y="125" width="320" height="10" rx="5" fill="#1e293b"/>
    <rect x="200" y="145" width="400" height="6" rx="3" fill="#64748b"/>
    
    <!-- Switch -->
    <rect x="370" y="165" width="60" height="15" rx="7.5" fill="#2563eb"/>
    <circle cx="418" cy="172.5" r="5" fill="white"/>

    <!-- Cards (Starter, Company, Enterprise) -->
    <!-- Card 1: Starter -->
    <rect x="180" y="200" width="120" height="145" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="200" y="215" width="80" height="10" rx="5" fill="#0f172a"/>
    <circle cx="240" cy="245" r="12" fill="#f8fafc"/>
    <rect x="195" y="275" width="90" height="40" rx="4" fill="#cbd5e1" fill-opacity="0.2"/>
    <rect x="195" y="325" width="90" height="12" rx="6" fill="#1d4ed8"/>

    <!-- Card 2: Company (Popular Card Highlight) -->
    <rect x="315" y="190" width="130" height="160" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="345" y="210" width="70" height="12" rx="6" fill="#0f172a"/>
    <circle cx="380" cy="245" r="16" fill="#dbeafe"/>
    <rect x="330" y="275" width="100" height="40" rx="4" fill="#cbd5e1" fill-opacity="0.2"/>
    <rect x="330" y="325" width="100" height="15" rx="7.5" fill="#2563eb"/>
    <rect x="355" y="190" width="50" height="8" rx="4" fill="#2563eb"/>

    <!-- Card 3: Enterprise -->
    <rect x="460" y="200" width="120" height="145" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="480" y="215" width="80" height="10" rx="5" fill="#0f172a"/>
    <circle cx="520" cy="245" r="12" fill="#f8fafc"/>
    <rect x="475" y="275" width="90" height="40" rx="4" fill="#cbd5e1" fill-opacity="0.2"/>
    <rect x="475" y="325" width="90" height="12" rx="6" fill="#1d4ed8"/>

    <!-- Title -->
    <text x="50%" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">Premium Pricing Cards Section</text>
</svg>
