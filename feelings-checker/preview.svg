<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#311042"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#e0f7fa"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#64748b"/>

    <!-- Screen Mockup Content -->
    <!-- Mood Card Mockup -->
    <rect x="220" y="125" width="360" height="220" rx="12" fill="#ffffff" stroke="#b2ebf2" stroke-width="1"/>
    
    <!-- Title -->
    <rect x="300" y="140" width="200" height="12" rx="6" fill="#004d40"/>
    <rect x="260" y="158" width="280" height="6" rx="3" fill="#00796b"/>
    
    <!-- Input Field -->
    <rect x="240" y="175" width="200" height="25" rx="6" fill="#f5fdfd" stroke="#b2ebf2" stroke-width="1"/>
    <rect x="450" y="175" width="110" height="25" rx="6" fill="#009688"/>
    
    <!-- Quick buttons -->
    <rect x="240" y="210" width="55" height="18" rx="4" fill="#f5fdfd" stroke="#b2ebf2"/>
    <rect x="305" y="210" width="55" height="18" rx="4" fill="#f5fdfd" stroke="#b2ebf2"/>
    <rect x="370" y="210" width="55" height="18" rx="4" fill="#f5fdfd" stroke="#b2ebf2"/>
    <rect x="435" y="210" width="55" height="18" rx="4" fill="#f5fdfd" stroke="#b2ebf2"/>
    <rect x="500" y="210" width="60" height="18" rx="4" fill="#f5fdfd" stroke="#b2ebf2"/>
    
    <!-- Dynamic Result Box -->
    <rect x="240" y="240" width="320" height="90" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-dasharray="3 3"/>
    
    <!-- Emoji face -->
    <circle cx="285" cy="285" r="25" fill="#facc15"/>
    <circle cx="277" cy="280" r="3" fill="#1e293b"/>
    <circle cx="293" cy="280" r="3" fill="#1e293b"/>
    <path d="M 275 295 Q 285 305 295 295" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Info -->
    <rect x="330" y="260" width="120" height="10" rx="5" fill="#0f172a"/>
    <rect x="330" y="278" width="210" height="6" rx="3" fill="#475569"/>
    <rect x="330" y="288" width="180" height="6" rx="3" fill="#475569"/>
    <rect x="330" y="298" width="200" height="6" rx="3" fill="#475569"/>

    <!-- Title -->
    <text x="50%" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">AI-like Mood Tracker</text>
</svg>
