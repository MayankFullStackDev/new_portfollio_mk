<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#311042"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#e2e8f0"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#64748b"/>

    <!-- Screen Mockup Content -->
    <!-- Calculator Card Mockup -->
    <rect x="300" y="120" width="200" height="230" rx="12" fill="#605e5e" stroke="#787777" stroke-width="2"/>
    
    <!-- Screen output -->
    <rect x="315" y="135" width="170" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="475" y="160" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="700" fill="#38bdf8" text-anchor="end">42</text>
    
    <!-- Calculator keys (4x5 grid) -->
    <!-- Row 1 -->
    <rect x="315" y="185" width="35" height="25" rx="4" fill="#787777"/>
    <rect x="358" y="185" width="35" height="25" rx="4" fill="#787777"/>
    <rect x="402" y="185" width="35" height="25" rx="4" fill="#787777"/>
    <rect x="445" y="185" width="40" height="25" rx="4" fill="#9acd32"/>
    
    <!-- Row 2 -->
    <rect x="315" y="217" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="358" y="217" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="402" y="217" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="445" y="217" width="40" height="25" rx="4" fill="#9acd32"/>

    <!-- Row 3 -->
    <rect x="315" y="249" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="358" y="249" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="402" y="249" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="445" y="249" width="40" height="25" rx="4" fill="#9acd32"/>

    <!-- Row 4 -->
    <rect x="315" y="281" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="358" y="281" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="402" y="281" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="445" y="281" width="40" height="25" rx="4" fill="#9acd32"/>

    <!-- Row 5 -->
    <rect x="315" y="313" width="78" height="25" rx="4" fill="#b0acb0"/>
    <rect x="402" y="313" width="35" height="25" rx="4" fill="#b0acb0"/>
    <rect x="445" y="313" width="40" height="25" rx="4" fill="#9acd32"/>

    <!-- Title -->
    <text x="50%" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">JavaScript Calculator UI</text>
</svg>
