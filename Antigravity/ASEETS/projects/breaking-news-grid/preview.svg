<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#311042"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#f7f4eb"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#64748b"/>

    <!-- Screen Mockup Content -->
    <!-- Green Headline bar -->
    <rect x="170" y="120" width="460" height="25" rx="6" fill="#22c55e"/>
    <circle cx="185" cy="132.5" r="4" fill="white"/>
    <rect x="195" y="127.5" width="120" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
    
    <!-- Editorial Columns (Main 3/5, Sidebar 2/5) -->
    <!-- Main Article -->
    <rect x="170" y="155" width="260" height="190" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="185" y="170" width="80" height="10" rx="5" fill="#ffedd5"/>
    <rect x="185" y="190" width="230" height="15" rx="4" fill="#1c1917"/>
    <rect x="185" y="210" width="180" height="15" rx="4" fill="#1c1917"/>
    <!-- Banner -->
    <rect x="185" y="235" width="230" height="50" rx="6" fill="#a8a29e"/>
    <rect x="185" y="295" width="230" height="8" rx="4" fill="#78716c"/>
    <rect x="185" y="310" width="230" height="8" rx="4" fill="#78716c"/>
    <rect x="185" y="325" width="160" height="8" rx="4" fill="#78716c"/>
    
    <!-- Sidebar -->
    <rect x="445" y="155" width="185" height="190" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="460" y="170" width="100" height="12" rx="4" fill="#1c1917"/>
    
    <!-- Related Card 1 -->
    <rect x="460" y="195" width="155" height="40" rx="6" fill="#f5f5f4"/>
    <rect x="468" y="202.5" width="100" height="8" rx="4" fill="#1c1917"/>
    <rect x="468" y="215" width="130" height="5" rx="2" fill="#78716c"/>
    <rect x="468" y="223" width="80" height="5" rx="2" fill="#78716c"/>

    <!-- Related Card 2 -->
    <rect x="460" y="245" width="155" height="40" rx="6" fill="#f5f5f4"/>
    <rect x="468" y="252.5" width="100" height="8" rx="4" fill="#1c1917"/>
    <rect x="468" y="265" width="130" height="5" rx="2" fill="#78716c"/>
    <rect x="468" y="273" width="80" height="5" rx="2" fill="#78716c"/>

    <!-- Title -->
    <text x="50%" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">Editorial News Grid Mockup</text>
</svg>
