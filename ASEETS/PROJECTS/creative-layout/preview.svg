<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#311042"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#fafafa"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#64748b"/>
    
    <!-- Dashboard Columns (Sidebar 30%, Main 50%, Right 20%) -->
    <!-- Sidebar -->
    <rect x="160" y="110" width="144" height="250" fill="#fce7f3"/>
    <circle cx="180" cy="135" r="10" fill="#9d174d"/>
    <rect x="200" y="130" width="80" height="10" rx="5" fill="#86198f"/>
    <rect x="175" y="170" width="110" height="15" rx="4" fill="#fbcfe8"/>
    <rect x="175" y="195" width="110" height="15" rx="4" fill="#fbcfe8"/>
    <rect x="175" y="220" width="110" height="15" rx="4" fill="#fbcfe8"/>
    
    <!-- Main Content -->
    <rect x="304" y="110" width="240" height="250" fill="#fdf4ff"/>
    <!-- Hero block -->
    <rect x="319" y="125" width="210" height="60" rx="8" fill="#dbeafe"/>
    <rect x="334" y="140" width="110" height="12" rx="4" fill="#1e3a8a"/>
    <rect x="334" y="160" width="80" height="8" rx="4" fill="#3b82f6"/>
    <rect x="470" y="140" width="45" height="30" rx="6" fill="#fef08a"/>
    
    <!-- Stats Row -->
    <rect x="319" y="200" width="65" height="50" rx="8" fill="#0284c7"/>
    <rect x="394" y="200" width="65" height="50" rx="8" fill="#0284c7"/>
    <rect x="469" y="200" width="60" height="50" rx="8" fill="#0284c7"/>
    
    <!-- Chart Box -->
    <rect x="319" y="265" width="210" height="80" rx="8" fill="#dbeafe"/>
    <rect x="334" y="280" width="80" height="8" rx="4" fill="#1e3a8a"/>
    <!-- Chart Bars -->
    <rect x="334" y="325" width="15" height="15" rx="2" fill="#93c5fd"/>
    <rect x="359" y="310" width="15" height="30" rx="2" fill="#93c5fd"/>
    <rect x="384" y="300" width="15" height="40" rx="2" fill="#93c5fd"/>
    <rect x="409" y="315" width="15" height="25" rx="2" fill="#93c5fd"/>
    <rect x="434" y="295" width="15" height="45" rx="2" fill="#3b82f6"/>
    
    <!-- Right Panel -->
    <rect x="544" y="110" width="96" height="250" fill="#ecfdf5"/>
    <rect x="554" y="125" width="76" height="80" rx="8" fill="#ffffff"/>
    <rect x="564" y="135" width="56" height="8" rx="4" fill="#064e3b"/>
    <rect x="564" y="155" width="46" height="6" rx="3" fill="#10b981"/>
    <rect x="564" y="170" width="46" height="6" rx="3" fill="#10b981"/>
    
    <rect x="554" y="220" width="76" height="80" rx="8" fill="#f59e0b"/>
    <rect x="564" y="230" width="56" height="8" rx="4" fill="#ffffff"/>
    <rect x="564" y="250" width="50" height="30" rx="4" fill="#ffffff" fill-opacity="0.2"/>

    <!-- Title -->
    <text x="50%" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">Creative Dashboard Layout Mockup</text>
</svg>
