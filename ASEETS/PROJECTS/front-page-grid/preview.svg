<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#311042"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    <circle cx="10%" cy="15%" r="150" fill="#ffffff" fill-opacity="0.02"/>
    <circle cx="90%" cy="85%" r="200" fill="#ffffff" fill-opacity="0.02"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#f1f5f9"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#64748b"/>
    <rect x="360" y="400" width="80" height="6" rx="3" fill="#475569"/>

    <!-- Screen Mockup Content -->
    <!-- Header -->
    <rect x="170" y="120" width="460" height="30" rx="6" fill="#52357B"/>
    <circle cx="185" cy="135" r="5" fill="#ef4444"/>
    <circle cx="195" cy="135" r="5" fill="#f59e0b"/>
    <circle cx="205" cy="135" r="5" fill="#22c55e"/>
    <rect x="220" y="130" width="80" height="10" rx="5" fill="#ffffff" fill-opacity="0.3"/>
    
    <!-- Hero Text -->
    <rect x="180" y="170" width="200" height="20" rx="4" fill="#1e1b4b"/>
    <rect x="180" y="195" width="150" height="12" rx="4" fill="#6366f1"/>
    <rect x="180" y="215" width="220" height="8" rx="4" fill="#64748b"/>
    <rect x="180" y="228" width="180" height="8" rx="4" fill="#64748b"/>
    
    <!-- Button -->
    <rect x="180" y="250" width="80" height="20" rx="10" fill="#00CAFF"/>
    
    <!-- Card Grid -->
    <rect x="180" y="290" width="130" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="205" cy="315" r="15" fill="#ffedd5"/>
    <rect x="230" y="315" width="60" height="8" rx="4" fill="#64748b"/>
    
    <rect x="325" y="290" width="130" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="350" cy="315" r="15" fill="#dbeafe"/>
    <rect x="375" y="315" width="60" height="8" rx="4" fill="#64748b"/>

    <rect x="470" y="290" width="130" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="495" cy="315" r="15" fill="#e0f2fe"/>
    <rect x="520" y="315" width="60" height="8" rx="4" fill="#64748b"/>
    
    <!-- Title Text outside laptop -->
    <text x="50%" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">MK Transport Landing Page</text>
</svg>
