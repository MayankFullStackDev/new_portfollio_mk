<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#311042"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#ffffff"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#64748b"/>

    <!-- Screen Mockup Content -->
    <!-- Table Header Card -->
    <rect x="180" y="125" width="220" height="15" rx="5" fill="#0f172a"/>
    <rect x="180" y="145" width="200" height="8" rx="4" fill="#64748b"/>
    
    <!-- Search Bar Mockup -->
    <rect x="460" y="125" width="160" height="25" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="475" cy="137.5" r="4" fill="#94a3b8"/>
    <line x1="479" y1="141" x2="484" y2="146" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Table Header Columns -->
    <rect x="180" y="165" width="440" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Vertical lines -->
    <line x1="240" y1="165" x2="240" y2="195" stroke="#e2e8f0"/>
    <line x1="330" y1="165" x2="330" y2="195" stroke="#e2e8f0"/>
    <line x1="380" y1="165" x2="380" y2="195" stroke="#e2e8f0"/>
    <line x1="440" y1="165" x2="440" y2="195" stroke="#e2e8f0"/>
    
    <!-- Table Rows -->
    <rect x="180" y="200" width="440" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="190" y="210" width="30" height="10" rx="3" fill="#6366f1"/>
    <rect x="250" y="210" width="50" height="10" rx="3" fill="#0f172a"/>
    <rect x="390" y="210" width="30" height="10" rx="5" fill="#dcfce7"/>
    
    <rect x="180" y="235" width="440" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="190" y="245" width="30" height="10" rx="3" fill="#6366f1"/>
    <rect x="250" y="245" width="50" height="10" rx="3" fill="#0f172a"/>
    <rect x="390" y="245" width="30" height="10" rx="5" fill="#dcfce7"/>
    
    <rect x="180" y="270" width="440" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="190" y="280" width="30" height="10" rx="3" fill="#6366f1"/>
    <rect x="250" y="280" width="50" height="10" rx="3" fill="#0f172a"/>
    <rect x="390" y="280" width="30" height="10" rx="5" fill="#dcfce7"/>
    
    <!-- Title -->
    <text x="50%" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">Student Directory Data Table</text>
</svg>
