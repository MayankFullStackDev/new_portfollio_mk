<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="100%" stop-color="#311042"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#cbd5e1" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#f1f5f9"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#64748b"/>

    <!-- Screen Mockup Content -->
    <!-- Sidebar (IT Blue) -->
    <rect x="160" y="110" width="150" height="250" fill="#1e56fc"/>
    <circle cx="190" cy="135" r="12" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="210" y="130" width="80" height="10" rx="5" fill="#ffffff"/>
    
    <!-- search -->
    <rect x="175" y="160" width="120" height="20" rx="6" fill="#ffffff" fill-opacity="0.15"/>
    <circle cx="187.5" cy="170" r="3" fill="#cbd5e1"/>
    
    <!-- list items -->
    <rect x="170" y="195" width="130" height="30" rx="6" fill="#fff085"/>
    <circle cx="185" cy="210" r="8" fill="#1e293b" fill-opacity="0.1"/>
    <rect x="200" y="202" width="60" height="6" rx="3" fill="#0f172a"/>
    <rect x="200" y="212" width="40" height="4" rx="2" fill="#0f172a" fill-opacity="0.6"/>

    <rect x="170" y="235" width="130" height="30" rx="6" fill="#ffffff" fill-opacity="0.08"/>
    <circle cx="185" cy="250" r="8" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="200" y="242" width="60" height="6" rx="3" fill="#ffffff"/>
    <rect x="200" y="252" width="40" height="4" rx="2" fill="#ffffff" fill-opacity="0.6"/>

    <rect x="170" y="275" width="130" height="30" rx="6" fill="#ffffff" fill-opacity="0.08"/>
    <circle cx="185" cy="290" r="8" fill="#ffffff" fill-opacity="0.2"/>
    
    <!-- Display Panel -->
    <rect x="310" y="110" width="330" height="250" fill="#f8fafc"/>
    <rect x="340" y="140" width="270" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Cover -->
    <path d="M 340 152 A 12 12 0 0 1 352 140 L 598 140 A 12 12 0 0 1 610 152 L 610 190 L 340 190 Z" fill="linear-gradient(135deg, #1e56fc 0%, #b13bff 100%)" fill-opacity="0.8"/>
    <!-- Photo container -->
    <circle cx="475" cy="190" r="30" fill="white" stroke="#cbd5e1" stroke-width="1"/>
    <circle cx="475" cy="190" r="26" fill="#1e56fc" fill-opacity="0.2"/>
    
    <!-- details -->
    <rect x="415" y="235" width="120" height="12" rx="6" fill="#0f172a"/>
    <rect x="435" y="255" width="80" height="10" rx="5" fill="#1e56fc" fill-opacity="0.1"/>
    <rect x="375" y="280" width="200" height="6" rx="3" fill="#64748b"/>
    <rect x="375" y="292" width="200" height="6" rx="3" fill="#64748b"/>
    <rect x="375" y="304" width="150" height="6" rx="3" fill="#64748b"/>

    <!-- Title -->
    <text x="50%" y="70" font-family="'Outfit', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">EP Trainer &amp; Student Directory</text>
</svg>
