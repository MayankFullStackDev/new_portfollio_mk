<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8"/>
            <stop offset="100%" stop-color="#c084fc"/>
        </linearGradient>
        <radialGradient id="sunGrad" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#b45309"/>
        </radialGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGrad)"/>
    <circle cx="80%" cy="20%" r="1" fill="#fff" fill-opacity="0.8"/>
    <circle cx="20%" cy="80%" r="1.5" fill="#fff" fill-opacity="0.6"/>
    <circle cx="45%" cy="30%" r="1" fill="#fff" fill-opacity="0.5"/>
    <circle cx="85%" cy="75%" r="2" fill="#fff" fill-opacity="0.4"/>
    
    <!-- Laptop Mockup Frame -->
    <rect x="150" y="100" width="500" height="300" rx="10" fill="#0f172a" stroke="#475569" stroke-width="4"/>
    <rect x="160" y="110" width="480" height="250" rx="4" fill="#020617"/>
    <!-- Laptop Base -->
    <path d="M 100 400 L 700 400 L 680 415 L 120 415 Z" fill="#475569"/>

    <!-- Screen Mockup Content -->
    <!-- Sidebar -->
    <rect x="170" y="120" width="130" height="230" rx="8" fill="#0f172a" fill-opacity="0.6" stroke="rgba(255,255,255,0.05)"/>
    <rect x="180" y="130" width="110" height="15" rx="4" fill="#1e293b"/>
    <!-- Planet items -->
    <rect x="180" y="160" width="110" height="16" rx="8" fill="#f59e0b"/>
    <rect x="180" y="182" width="110" height="16" rx="8" fill="#1e293b"/>
    <rect x="180" y="204" width="110" height="16" rx="8" fill="#1e293b"/>
    <rect x="180" y="226" width="110" height="16" rx="8" fill="#1e293b"/>
    <rect x="180" y="248" width="110" height="16" rx="8" fill="#1e293b"/>
    <rect x="180" y="270" width="110" height="16" rx="8" fill="#1e293b"/>
    
    <!-- Info Panel -->
    <rect x="315" y="120" width="310" height="230" rx="8" fill="#0f172a" fill-opacity="0.4" stroke="rgba(255,255,255,0.05)"/>
    
    <!-- Glowing Planet Sphere -->
    <circle cx="470" cy="180" r="40" fill="url(#sunGrad)" filter="drop-shadow(0 0 15px #f59e0b)"/>
    
    <!-- Title details -->
    <rect x="335" y="240" width="270" height="15" rx="4" fill="#f8fafc"/>
    <rect x="335" y="265" width="270" height="8" rx="4" fill="#cbd5e1" fill-opacity="0.3"/>
    <rect x="335" y="280" width="220" height="8" rx="4" fill="#cbd5e1" fill-opacity="0.3"/>
    
    <!-- Stats boxes -->
    <rect x="335" y="300" width="80" height="35" rx="6" fill="#0f172a"/>
    <rect x="430" y="300" width="80" height="35" rx="6" fill="#0f172a"/>
    <rect x="525" y="300" width="80" height="35" rx="6" fill="#0f172a"/>

    <!-- Title -->
    <text x="50%" y="70" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="700" fill="url(#accentGrad)" text-anchor="middle">Interactive Space Encyclopedia</text>
</svg>
